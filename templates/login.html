<!DOCTYPE HTML>
<html lang="ko">
    <head>
        <title>로그인 — Painto</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/fontawesome-all.min.css') }}" />
        <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/modern.css') }}" />
    </head>
    <body>
        <div class="auth-page">
            <div class="auth-card">
                <h1>로그인</h1>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% for category, message in messages %}
                        <div class="auth-flash auth-flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-field">
                        <label for="email">이메일</label>
                        <input type="email" id="email" name="email" value="{{ email or '' }}" required autofocus>
                    </div>
                    <div class="form-field">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">로그인</button>
                </form>

                <p class="auth-footer">
                    아직 계정이 없으신가요? <a href="{{ url_for('signup') }}">회원가입</a>
                </p>
            </div>
        </div>
    </body>
</html>
